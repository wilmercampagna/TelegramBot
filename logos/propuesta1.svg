<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7d9a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="#ffffff"/>

  <!-- Mountain silhouette with survey point -->
  <g transform="translate(80, 60)">
    <!-- Mountains -->
    <polygon points="0,140 50,60 80,100 120,30 160,90 200,50 240,140"
             fill="url(#grad1)" opacity="0.15"/>
    <polygon points="0,140 50,60 80,100 120,30 160,90 200,50 240,140"
             fill="none" stroke="url(#grad1)" stroke-width="2.5"/>

    <!-- Survey tripod -->
    <line x1="120" y1="30" x2="100" y2="140" stroke="#1a3a5c" stroke-width="1.5"/>
    <line x1="120" y1="30" x2="140" y2="140" stroke="#1a3a5c" stroke-width="1.5"/>
    <line x1="120" y1="30" x2="120" y2="140" stroke="#1a3a5c" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Survey point (circle at peak) -->
    <circle cx="120" cy="26" r="8" fill="#2d7d9a" stroke="#1a3a5c" stroke-width="2"/>
    <circle cx="120" cy="26" r="3" fill="#ffffff"/>

    <!-- Crosshair -->
    <line x1="120" y1="14" x2="120" y2="38" stroke="#1a3a5c" stroke-width="1" opacity="0.5"/>
    <line x1="108" y1="26" x2="132" y2="26" stroke="#1a3a5c" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Text -->
  <g transform="translate(340, 100)">
    <text x="0" y="0" font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="36" font-weight="700" fill="#1a3a5c" letter-spacing="2">
      JUAN CARLOS
    </text>
    <text x="0" y="42" font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="36" font-weight="700" fill="#2d7d9a" letter-spacing="2">
      POZADA
    </text>
    <line x1="0" y1="55" x2="200" y2="55" stroke="#2d7d9a" stroke-width="1.5"/>
    <text x="0" y="78" font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="13" font-weight="400" fill="#5a7a8a" letter-spacing="5">
      TOPOGRAFIA
    </text>
  </g>
</svg>