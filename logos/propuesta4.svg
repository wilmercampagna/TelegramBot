<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g4a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7d9a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g4b" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#3ec6e0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2d7d9a;stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="#ffffff"/>

  <g transform="translate(200, 200)">
    <!-- Dark square background -->
    <rect x="-130" y="-130" width="260" height="260" rx="18" fill="#0e2a3f"/>

    <!-- Topographic grid -->
    <line x1="-100" y1="-60" x2="100" y2="-60" stroke="#1a3a5c" stroke-width="0.5"/>
    <line x1="-100" y1="-20" x2="100" y2="-20" stroke="#1a3a5c" stroke-width="0.5"/>
    <line x1="-100" y1="20" x2="100" y2="20" stroke="#1a3a5c" stroke-width="0.5"/>
    <line x1="-100" y1="60" x2="100" y2="60" stroke="#1a3a5c" stroke-width="0.5"/>
    <line x1="-60" y1="-100" x2="-60" y2="100" stroke="#1a3a5c" stroke-width="0.5"/>
    <line x1="-20" y1="-100" x2="-20" y2="100" stroke="#1a3a5c" stroke-width="0.5"/>
    <line x1="20" y1="-100" x2="20" y2="100" stroke="#1a3a5c" stroke-width="0.5"/>
    <line x1="60" y1="-100" x2="60" y2="100" stroke="#1a3a5c" stroke-width="0.5"/>

    <!-- Contour lines (terrain below) -->
    <ellipse cx="10" cy="50" rx="70" ry="30" fill="none" stroke="#2d7d9a" stroke-width="1" opacity="0.3"/>
    <ellipse cx="10" cy="50" rx="50" ry="20" fill="none" stroke="#2d7d9a" stroke-width="1" opacity="0.45"/>
    <ellipse cx="10" cy="50" rx="30" ry="12" fill="none" stroke="#2d7d9a" stroke-width="1.2" opacity="0.6"/>
    <ellipse cx="10" cy="50" rx="12" ry="5" fill="none" stroke="#3ec6e0" stroke-width="1.5" opacity="0.8"/>

    <!-- LiDAR scan cone (from drone downward) -->
    <polygon points="0,-20 -55,80 55,80" fill="url(#g4b)" opacity="0.12"/>
    <line x1="0" y1="-18" x2="-50" y2="75" stroke="#3ec6e0" stroke-width="0.7" opacity="0.3" stroke-dasharray="3,4"/>
    <line x1="0" y1="-18" x2="50" y2="75" stroke="#3ec6e0" stroke-width="0.7" opacity="0.3" stroke-dasharray="3,4"/>
    <line x1="0" y1="-18" x2="-30" y2="75" stroke="#3ec6e0" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,3"/>
    <line x1="0" y1="-18" x2="30" y2="75" stroke="#3ec6e0" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,3"/>
    <line x1="0" y1="-18" x2="0" y2="75" stroke="#3ec6e0" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,3"/>

    <!-- Scan dots on terrain -->
    <circle cx="-25" cy="55" r="1.5" fill="#3ec6e0" opacity="0.7"/>
    <circle cx="-10" cy="45" r="1.5" fill="#3ec6e0" opacity="0.8"/>
    <circle cx="5" cy="50" r="1.5" fill="#3ec6e0" opacity="0.9"/>
    <circle cx="20" cy="42" r="1.5" fill="#3ec6e0" opacity="0.7"/>
    <circle cx="35" cy="55" r="1.5" fill="#3ec6e0" opacity="0.6"/>
    <circle cx="-15" cy="60" r="1.5" fill="#3ec6e0" opacity="0.5"/>
    <circle cx="10" cy="62" r="1.5" fill="#3ec6e0" opacity="0.6"/>
    <circle cx="-35" cy="65" r="1.5" fill="#3ec6e0" opacity="0.4"/>
    <circle cx="40" cy="68" r="1.5" fill="#3ec6e0" opacity="0.4"/>
    <circle cx="0" cy="38" r="1.5" fill="#3ec6e0" opacity="0.9"/>

    <!-- Drone body -->
    <g transform="translate(0, -35)">
      <!-- Arms -->
      <line x1="-35" y1="-5" x2="-12" y2="2" stroke="#c0dce6" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="35" y1="-5" x2="12" y2="2" stroke="#c0dce6" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-30" y1="12" x2="-10" y2="5" stroke="#c0dce6" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="30" y1="12" x2="10" y2="5" stroke="#c0dce6" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Rotors -->
      <ellipse cx="-37" cy="-6" rx="14" ry="4" fill="none" stroke="#3ec6e0" stroke-width="1.2" opacity="0.6"/>
      <ellipse cx="37" cy="-6" rx="14" ry="4" fill="none" stroke="#3ec6e0" stroke-width="1.2" opacity="0.6"/>
      <ellipse cx="-32" cy="13" rx="14" ry="4" fill="none" stroke="#3ec6e0" stroke-width="1.2" opacity="0.6"/>
      <ellipse cx="32" cy="13" rx="14" ry="4" fill="none" stroke="#3ec6e0" stroke-width="1.2" opacity="0.6"/>

      <!-- Rotor centers -->
      <circle cx="-37" cy="-6" r="2" fill="#3ec6e0"/>
      <circle cx="37" cy="-6" r="2" fill="#3ec6e0"/>
      <circle cx="-32" cy="13" r="2" fill="#3ec6e0"/>
      <circle cx="32" cy="13" r="2" fill="#3ec6e0"/>

      <!-- Body -->
      <rect x="-14" y="-4" width="28" height="14" rx="5" fill="#c0dce6"/>
      <rect x="-10" y="-1" width="20" height="8" rx="3" fill="#1a3a5c"/>

      <!-- LiDAR sensor (bottom) -->
      <circle cx="0" cy="14" r="4" fill="#2d7d9a" stroke="#3ec6e0" stroke-width="1.5"/>
      <circle cx="0" cy="14" r="1.5" fill="#3ec6e0"/>
    </g>
  </g>
</svg>