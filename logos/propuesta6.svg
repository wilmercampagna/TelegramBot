    <circle cx="165" cy="245" r="1.4" opacity="0.5"/>
    <circle cx="180" cy="232" r="1.5" opacity="0.55"/>
    <circle cx="192" cy="218" r="1.5" opacity="0.6"/>
    <circle cx="200" cy="205" r="1.6" opacity="0.7"/>
    <circle cx="200" cy="192" r="1.6" opacity="0.75"/>
    <circle cx="205" cy="178" r="1.7" opacity="0.85"/>
    <circle cx="210" cy="192" r="1.5" opacity="0.7"/>
    <circle cx="225" cy="205" r="1.5" opacity="0.6"/>
    <circle cx="240" cy="218" r="1.4" opacity="0.55"/>
    <circle cx="255" cy="232" r="1.4" opacity="0.5"/>
    <circle cx="270" cy="248" r="1.3" opacity="0.45"/>
    <circle cx="288" cy="265" r="1.3" opacity="0.4"/>
    <circle cx="122" cy="260" r="1.1" opacity="0.4"/>
    <circle cx="140" cy="245" r="1.1" opacity="0.45"/>
    <circle cx="158" cy="228" r="1.2" opacity="0.5"/>
    <circle cx="172" cy="215" r="1.3" opacity="0.55"/>
    <circle cx="188" cy="198" r="1.4" opacity="0.65"/>
    <circle cx="215" cy="202" r="1.3" opacity="0.6"/>
    <circle cx="232" cy="215" r="1.2" opacity="0.52"/>
    <circle cx="248" cy="228" r="1.2" opacity="0.47"/>
    <circle cx="265" cy="242" r="1.1" opacity="0.42"/>
    <circle cx="282" cy="255" r="1.1" opacity="0.37"/>
    <circle cx="155" cy="215" r="1.1" opacity="0.55"/>
    <circle cx="170" cy="198" r="1.3" opacity="0.65"/>
    <circle cx="188" cy="185" r="1.5" opacity="0.75"/>
    <circle cx="212" cy="185" r="1.4" opacity="0.7"/>
    <circle cx="230" cy="198" r="1.2" opacity="0.55"/>
    <circle cx="245" cy="212" r="1.1" opacity="0.45"/>
  </g>

  <!-- LiDAR scan cone -->
  <polygon points="200,118 140,265 260,265" fill="url(#g6scan)"/>

  <!-- Scan sweep lines -->
  <line x1="200" y1="120" x2="148" y2="255" stroke="#2d7d9a" stroke-width="0.7" opacity="0.2" stroke-dasharray="4,6"/>
  <line x1="200" y1="120" x2="175" y2="255" stroke="#2d7d9a" stroke-width="0.7" opacity="0.15" stroke-dasharray="3,5"/>
  <line x1="200" y1="120" x2="200" y2="255" stroke="#2d7d9a" stroke-width="0.7" opacity="0.2" stroke-dasharray="4,6"/>
  <line x1="200" y1="120" x2="225" y2="255" stroke="#2d7d9a" stroke-width="0.7" opacity="0.15" stroke-dasharray="3,5"/>
  <line x1="200" y1="120" x2="252" y2="255" stroke="#2d7d9a" stroke-width="0.7" opacity="0.2" stroke-dasharray="4,6"/>

  <!-- Drone -->
  <g transform="translate(200, 100)">
    <!-- Arms -->
    <line x1="-35" y1="-14" x2="-12" y2="0" stroke="#1a3a5c" stroke-width="3" stroke-linecap="round"/>
    <line x1="35" y1="-14" x2="12" y2="0" stroke="#1a3a5c" stroke-width="3" stroke-linecap="round"/>
    <line x1="-30" y1="16" x2="-9" y2="5" stroke="#1a3a5c" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="16" x2="9" y2="5" stroke="#1a3a5c" stroke-width="3" stroke-linecap="round"/>

    <!-- Rotors -->
    <circle cx="-37" cy="-15" r="12" fill="none" stroke="#2d7d9a" stroke-width="1.5" opacity="0.5"/>
    <circle cx="37" cy="-15" r="12" fill="none" stroke="#2d7d9a" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-32" cy="17" r="12" fill="none" stroke="#2d7d9a" stroke-width="1.5" opacity="0.5"/>
    <circle cx="32" cy="17" r="12" fill="none" stroke="#2d7d9a" stroke-width="1.5" opacity="0.5"/>

    <!-- Rotor hubs -->
    <circle cx="-37" cy="-15" r="2.5" fill="#2d7d9a"/>
    <circle cx="37" cy="-15" r="2.5" fill="#2d7d9a"/>
    <circle cx="-32" cy="17" r="2.5" fill="#2d7d9a"/>
    <circle cx="32" cy="17" r="2.5" fill="#2d7d9a"/>

    <!-- Body -->
    <rect x="-14" y="-7" width="28" height="16" rx="6" fill="#1a3a5c"/>
    <rect x="-9" y="-4" width="18" height="10" rx="3" fill="#0e2a3f"/>

    <!-- LiDAR emitter -->
    <circle cx="0" cy="14" r="5.5" fill="#1a3a5c" stroke="#2d7d9a" stroke-width="1.5"/>
    <circle cx="0" cy="14" r="2.2" fill="#3ec6e0"/>

    <!-- Pulse rings -->
    <circle cx="0" cy="14" r="9" fill="none" stroke="#2d7d9a" stroke-width="0.8" opacity="0.3"/>
    <circle cx="0" cy="14" r="13" fill="none" stroke="#2d7d9a" stroke-width="0.5" opacity="0.15"/>
