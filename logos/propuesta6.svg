<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="g6scan" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#3ec6e0;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#3ec6e0;stop-opacity:0" />
