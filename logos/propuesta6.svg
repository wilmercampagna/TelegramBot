    <polyline points="60,288 110,265 160,248 200,235 240,242 290,258 340,278"/>
    <polyline points="70,265 120,240 170,218 200,205 240,212 290,232 330,255"/>
    <polyline points="80,245 130,215 175,192 200,178 230,188 275,208 320,235"/>
  </g>
  <g stroke="#2d7d9a" stroke-width="1.2" fill="none" opacity="0.6">
    <polyline points="90,250 140,225 180,202 200,192 225,198 270,218 315,242"/>
    <polyline points="105,232 150,208 180,188 200,175 225,182 265,202 305,225"/>
  </g>

  <!-- Point cloud dots -->
  <g fill="#2d7d9a">
