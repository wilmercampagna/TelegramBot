<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d4f3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a8a6e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="#ffffff"/>

  <!-- Centered layout -->
  <g transform="translate(300, 40)">

    <!-- Hexagonal frame with theodolite -->
    <g transform="translate(0, 0)">
      <!-- Outer hexagon -->
      <polygon points="0,-65 56,-32 56,32 0,65 -56,32 -56,-32"
               fill="none" stroke="#0d4f3c" stroke-width="2.5"/>

      <!-- Inner terrain line -->
      <polyline points="-35,20 -18,5 -5,15 10,-10 22,8 35,-5"
                fill="none" stroke="#1a8a6e" stroke-width="2" stroke-linecap="round"/>

      <!-- Level/theodolite icon -->
      <circle cx="0" cy="-15" r="14" fill="none" stroke="#0d4f3c" stroke-width="2"/>
      <circle cx="0" cy="-15" r="5" fill="#1a8a6e"/>
      <circle cx="0" cy="-15" r="2" fill="#ffffff"/>
      <line x1="-18" y1="-15" x2="18" y2="-15" stroke="#0d4f3c" stroke-width="1"/>
      <line x1="0" y1="-33" x2="0" y2="3" stroke="#0d4f3c" stroke-width="1"/>

      <!-- Tripod legs from bottom of circle -->
      <line x1="0" y1="-1" x2="-15" y2="20" stroke="#0d4f3c" stroke-width="1.5"/>
      <line x1="0" y1="-1" x2="15" y2="20" stroke="#0d4f3c" stroke-width="1.5"/>
    </g>

    <!-- Company name -->
    <text x="0" y="100" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="300" fill="#0d4f3c" letter-spacing="8">
      TOPOGRAFIA &amp; CONSULTORIA
    </text>

    <text x="0" y="140" text-anchor="middle"
          font-family="'Georgia', 'Times New Roman', serif"
          font-size="42" font-weight="400" fill="#0d4f3c" letter-spacing="3">
      Juan Carlos
    </text>

    <text x="0" y="185" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="48" font-weight="700" fill="#1a8a6e" letter-spacing="6">
      POZADA
    </text>

    <!-- Decorative lines -->
    <line x1="-120" y1="200" x2="-20" y2="200" stroke="#0d4f3c" stroke-width="1"/>
    <circle cx="0" cy="200" r="3" fill="#1a8a6e"/>
    <line x1="20" y1="200" x2="120" y2="200" stroke="#0d4f3c" stroke-width="1"/>

    <text x="0" y="225" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="10" font-weight="400" fill="#6a8a7a" letter-spacing="3">
      PRECISION  &#8226;  CALIDAD  &#8226;  COMPROMISO
    </text>
  </g>
</svg>