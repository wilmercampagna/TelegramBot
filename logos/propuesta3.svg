<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="grad3a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a4a4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c49a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c547;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="#ffffff"/>

  <g transform="translate(300, 150)">

    <!-- Left side: Icon -->
    <g transform="translate(-200, 0)">
      <!-- Abstract "JCP" monogram with survey cross -->
      <rect x="-55" y="-55" width="110" height="110" rx="8"
            fill="#2c2c2c"/>

      <!-- Grid lines (topographic feel) -->
      <line x1="-40" y1="-20" x2="40" y2="-20" stroke="#4a4a4a" stroke-width="0.5"/>
      <line x1="-40" y1="0" x2="40" y2="0" stroke="#4a4a4a" stroke-width="0.5"/>
      <line x1="-40" y1="20" x2="40" y2="20" stroke="#4a4a4a" stroke-width="0.5"/>
      <line x1="-20" y1="-40" x2="-20" y2="40" stroke="#4a4a4a" stroke-width="0.5"/>
      <line x1="0" y1="-40" x2="0" y2="40" stroke="#4a4a4a" stroke-width="0.5"/>
      <line x1="20" y1="-40" x2="20" y2="40" stroke="#4a4a4a" stroke-width="0.5"/>

      <!-- Contour lines -->
      <ellipse cx="5" cy="-5" rx="30" ry="18" fill="none" stroke="#c49a2a" stroke-width="1.2" opacity="0.4"/>
      <ellipse cx="5" cy="-5" rx="20" ry="12" fill="none" stroke="#c49a2a" stroke-width="1.2" opacity="0.6"/>
      <ellipse cx="5" cy="-5" rx="10" ry="6" fill="none" stroke="#c49a2a" stroke-width="1.2" opacity="0.8"/>

      <!-- Survey crosshair -->
      <line x1="-8" y1="-5" x2="18" y2="-5" stroke="#e8c547" stroke-width="2"/>
      <line x1="5" y1="-18" x2="5" y2="8" stroke="#e8c547" stroke-width="2"/>
      <circle cx="5" cy="-5" r="4" fill="none" stroke="#e8c547" stroke-width="1.5"/>

      <!-- JCP initials -->
      <text x="0" y="42" text-anchor="middle"
            font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="16" font-weight="700" fill="#e8c547" letter-spacing="6">
        JCP
      </text>
    </g>

    <!-- Right side: Text -->
    <g transform="translate(30, 0)">
      <text x="0" y="-30"
            font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="15" font-weight="300" fill="#888888" letter-spacing="6">
        TOPOGRAFIA
      </text>

      <!-- Gold accent line -->
      <line x1="0" y1="-18" x2="180" y2="-18" stroke="url(#grad3b)" stroke-width="2"/>

      <text x="0" y="10"
            font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="30" font-weight="800" fill="#2c2c2c" letter-spacing="1">
        JUAN CARLOS
      </text>

      <text x="0" y="48"
            font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="38" font-weight="800" fill="#2c2c2c" letter-spacing="4">
        POZADA
      </text>

      <!-- Tagline -->
      <line x1="0" y1="60" x2="80" y2="60" stroke="#c49a2a" stroke-width="1"/>
      <text x="0" y="80"
            font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="10" font-weight="400" fill="#999999" letter-spacing="3">
        INGENIERIA  &#8226;  LEVANTAMIENTOS  &#8226;  GEODESIA
      </text>
    </g>
  </g>
</svg>