<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="g5scan" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#3ec6e0;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#3ec6e0;stop-opacity:0" />
    </radialGradient>

    <!-- Radial fade: dark center to transparent edges -->
    <radialGradient id="bgFade" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#0e2a3f;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#0e2a3f;stop-opacity:0.95" />
      <stop offset="70%" style="stop-color:#0e2a3f;stop-opacity:0.6" />
      <stop offset="85%" style="stop-color:#0e2a3f;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0e2a3f;stop-opacity:0" />
    </radialGradient>

    <!-- Radial mask for content fade-out -->
    <radialGradient id="contentMask" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:white;stop-opacity:1" />
      <stop offset="50%" style="stop-color:white;stop-opacity:1" />
      <stop offset="75%" style="stop-color:white;stop-opacity:0.7" />
      <stop offset="90%" style="stop-color:white;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </radialGradient>

    <mask id="fadeMask">
      <rect width="400" height="400" fill="url(#contentMask)"/>
    </mask>
  </defs>

  <!-- Transparent background -->
  <rect width="400" height="400" fill="none"/>

  <!-- Radial dark background fading to transparent -->
  <ellipse cx="200" cy="180" rx="200" ry="190" fill="url(#bgFade)"/>

  <!-- All content with fade mask -->
  <g mask="url(#fadeMask)">
    <!-- Subtle grid -->
    <g opacity="0.12">
      <line x1="40" y1="100" x2="360" y2="100" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="40" y1="140" x2="360" y2="140" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="40" y1="180" x2="360" y2="180" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="40" y1="220" x2="360" y2="220" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="40" y1="260" x2="360" y2="260" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="40" y1="300" x2="360" y2="300" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="100" y1="20" x2="100" y2="360" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="140" y1="20" x2="140" y2="360" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="180" y1="20" x2="180" y2="360" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="220" y1="20" x2="220" y2="360" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="260" y1="20" x2="260" y2="360" stroke="#2d7d9a" stroke-width="0.5"/>
      <line x1="300" y1="20" x2="300" y2="360" stroke="#2d7d9a" stroke-width="0.5"/>
    </g>

    <!-- 3D terrain mesh -->
    <g stroke="#2d7d9a" stroke-width="0.8" fill="none" opacity="0.4">
      <polyline points="60,310 110,292 160,278 200,268 240,272 290,285 340,300"/>
      <polyline points="60,288 110,265 160,248 200,235 240,242 290,258 340,278"/>
      <polyline points="70,265 120,240 170,218 200,205 240,212 290,232 330,255"/>
      <polyline points="80,245 130,215 175,192 200,178 230,188 275,208 320,235"/>
    </g>
    <g stroke="#3ec6e0" stroke-width="1" fill="none" opacity="0.5">
      <polyline points="90,250 140,225 180,202 200,192 225,198 270,218 315,242"/>
      <polyline points="105,232 150,208 180,188 200,175 225,182 265,202 305,225"/>
    </g>

    <!-- Point cloud dots -->
    <g fill="#3ec6e0">
      <circle cx="110" cy="288" r="1.2" opacity="0.3"/>
      <circle cx="130" cy="272" r="1.2" opacity="0.35"/>
      <circle cx="148" cy="258" r="1.2" opacity="0.4"/>
      <circle cx="165" cy="245" r="1.3" opacity="0.45"/>
      <circle cx="180" cy="232" r="1.3" opacity="0.5"/>
      <circle cx="192" cy="218" r="1.4" opacity="0.55"/>
      <circle cx="200" cy="205" r="1.5" opacity="0.65"/>
      <circle cx="200" cy="192" r="1.5" opacity="0.7"/>
      <circle cx="205" cy="178" r="1.6" opacity="0.8"/>
      <circle cx="210" cy="192" r="1.4" opacity="0.65"/>
      <circle cx="225" cy="205" r="1.3" opacity="0.55"/>
      <circle cx="240" cy="218" r="1.3" opacity="0.5"/>
      <circle cx="255" cy="232" r="1.2" opacity="0.45"/>
      <circle cx="270" cy="248" r="1.2" opacity="0.4"/>
      <circle cx="288" cy="265" r="1.2" opacity="0.35"/>
      <circle cx="122" cy="260" r="1" opacity="0.35"/>
      <circle cx="140" cy="245" r="1" opacity="0.4"/>
      <circle cx="158" cy="228" r="1.1" opacity="0.45"/>
      <circle cx="172" cy="215" r="1.2" opacity="0.5"/>
      <circle cx="188" cy="198" r="1.3" opacity="0.6"/>
      <circle cx="215" cy="202" r="1.2" opacity="0.55"/>
      <circle cx="232" cy="215" r="1.1" opacity="0.48"/>
      <circle cx="248" cy="228" r="1.1" opacity="0.42"/>
      <circle cx="265" cy="242" r="1" opacity="0.38"/>
      <circle cx="282" cy="255" r="1" opacity="0.32"/>
      <circle cx="155" cy="215" r="1" opacity="0.5"/>
      <circle cx="170" cy="198" r="1.2" opacity="0.6"/>
      <circle cx="188" cy="185" r="1.4" opacity="0.7"/>
      <circle cx="212" cy="185" r="1.3" opacity="0.65"/>
      <circle cx="230" cy="198" r="1.1" opacity="0.5"/>
      <circle cx="245" cy="212" r="1" opacity="0.4"/>
    </g>

    <!-- LiDAR scan cone -->
    <polygon points="200,118 140,265 260,265" fill="url(#g5scan)"/>

    <!-- Scan sweep lines -->
    <line x1="200" y1="120" x2="148" y2="255" stroke="#3ec6e0" stroke-width="0.6" opacity="0.2" stroke-dasharray="4,6"/>
    <line x1="200" y1="120" x2="175" y2="255" stroke="#3ec6e0" stroke-width="0.6" opacity="0.15" stroke-dasharray="3,5"/>
    <line x1="200" y1="120" x2="200" y2="255" stroke="#3ec6e0" stroke-width="0.6" opacity="0.2" stroke-dasharray="4,6"/>
    <line x1="200" y1="120" x2="225" y2="255" stroke="#3ec6e0" stroke-width="0.6" opacity="0.15" stroke-dasharray="3,5"/>
    <line x1="200" y1="120" x2="252" y2="255" stroke="#3ec6e0" stroke-width="0.6" opacity="0.2" stroke-dasharray="4,6"/>

    <!-- Drone -->
    <g transform="translate(200, 100)">
      <!-- Arms -->
      <line x1="-35" y1="-14" x2="-12" y2="0" stroke="#c0dce6" stroke-width="3" stroke-linecap="round"/>
      <line x1="35" y1="-14" x2="12" y2="0" stroke="#c0dce6" stroke-width="3" stroke-linecap="round"/>
      <line x1="-30" y1="16" x2="-9" y2="5" stroke="#c0dce6" stroke-width="3" stroke-linecap="round"/>
      <line x1="30" y1="16" x2="9" y2="5" stroke="#c0dce6" stroke-width="3" stroke-linecap="round"/>

      <!-- Rotors -->
      <circle cx="-37" cy="-15" r="12" fill="none" stroke="#3ec6e0" stroke-width="1.5" opacity="0.5"/>
      <circle cx="37" cy="-15" r="12" fill="none" stroke="#3ec6e0" stroke-width="1.5" opacity="0.5"/>
      <circle cx="-32" cy="17" r="12" fill="none" stroke="#3ec6e0" stroke-width="1.5" opacity="0.5"/>
      <circle cx="32" cy="17" r="12" fill="none" stroke="#3ec6e0" stroke-width="1.5" opacity="0.5"/>

      <!-- Rotor hubs -->
      <circle cx="-37" cy="-15" r="2.5" fill="#3ec6e0"/>
      <circle cx="37" cy="-15" r="2.5" fill="#3ec6e0"/>
      <circle cx="-32" cy="17" r="2.5" fill="#3ec6e0"/>
      <circle cx="32" cy="17" r="2.5" fill="#3ec6e0"/>

      <!-- Body -->
      <rect x="-14" y="-7" width="28" height="16" rx="6" fill="#c0dce6"/>
      <rect x="-9" y="-4" width="18" height="10" rx="3" fill="#1a3a5c"/>

      <!-- LiDAR emitter -->
      <circle cx="0" cy="14" r="5.5" fill="#1a3a5c" stroke="#3ec6e0" stroke-width="1.5"/>
      <circle cx="0" cy="14" r="2.2" fill="#3ec6e0"/>

      <!-- Pulse rings -->
      <circle cx="0" cy="14" r="9" fill="none" stroke="#3ec6e0" stroke-width="0.8" opacity="0.25"/>
      <circle cx="0" cy="14" r="13" fill="none" stroke="#3ec6e0" stroke-width="0.5" opacity="0.12"/>
    </g>
  </g>
</svg>